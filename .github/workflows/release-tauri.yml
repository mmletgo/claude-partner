# Build & Release (Tauri) — 三平台（macOS 双架构 / Windows / Linux）安装包打包发版 CI
#
# 触发：push v* tag。
# tauri-apps/tauri-action 自动构建各平台安装包（macOS→dmg、Windows→nsis+msi、Linux→AppImage+deb），
# 用 TAURI_SIGNING_PRIVATE_KEY 对安装包签名后上传到 GitHub Release，
# 并生成 latest.json（含各平台签名后的下载 URL + signature）附到 Release，供应用内 updater 校验。
# 日常代码质量检查（lint/clippy/test）见 ci.yml，由 PR/push master 触发。

name: Build & Release (Tauri)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      # 单个平台构建失败不阻断其他平台
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon（M 系列）
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          # macOS Intel
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          # Windows x86_64（nsis + msi）
          - platform: 'windows-latest'
            args: ''
            target: ''
          # Linux x86_64（appimage + deb）；ubuntu-22.04 带 webkit2gtk-4.1
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          # Linux arm64（aarch64）；GitHub 原生 arm64 runner，产出 arm64 AppImage/deb
          - platform: 'ubuntu-24.04-arm'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 按目标 target 装（aarch64/x86_64）；其他平台 target 为空，用默认 host target
          targets: ${{ matrix.target }}

      - name: Cache cargo build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # 按 平台+target 隔离缓存，避免 matrix 各 job 缓存碰撞
          shared-key: ${{ matrix.platform }}-${{ matrix.target }}

      - name: Install Linux system dependencies (webkit2gtk-4.1 等 Tauri 运行/构建依赖)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies (web/)
        run: cd web && npm ci

      - name: Build & publish with tauri-action
        # 用 @v0（浮动，指向最新 v0.x release，自动跟进上游修复）。
        # 注：latest.json 缺失是 tauri-action 上游 bug——其 artifacts 收集不收集 updater .sig
        # （与 tauri v2 updater bundle 兼容缺陷），致 upload-version-json "Signature not found" 跳过。
        # 已验证：固定 dev commit 61337b43 同样无效（dev 的 artifacts 收集也有此缺陷）。
        # 该 bug 需 tauri-action 上游修复，@v0 浮动会在新 release 发布后自动跟进。
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # updater 签名私钥（空密码，无需 TAURI_SIGNING_PRIVATE_KEY_PASSWORD）。
          # 需把 ~/.tauri/cc-partner.updater.key 的内容配到 repo secret
          # TAURI_SIGNING_PRIVATE_KEY。tauri-action 检测到该 env 即对安装包签名，
          # 并把签名信息写进 latest.json 供 updater 校验。未配则不签名、latest.json 无 signature。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          # 复用触发 CI 的 tag 名作为 Release tag，release notes 由 GitHub 自动生成
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          # Windows 用 nsis 安装包（非 msi）作为 updater 的下载源
          updaterJsonPreferNsis: true
          # 资产命名用 tauri-action 默认（不设 assetNamePattern）：
          #   普通产物保留 Tauri CLI 原文件名（已含版本+架构，如 cc-partner_0.6.0_x64.dmg）；
          #   macOS updater tarball（.app.tar.gz/.sig）自动追加 _版本_架构 后缀（如 cc-partner_0.6.0_x64.app.tar.gz），
          #   全局唯一不冲突；上传前还会先删除同名资产兜底。
          # 历史教训：曾用不存在的 [filename] 占位符 + 旧 input 名 assetNamePattern，导致同平台所有文件
          #   映射到同一字面名（darwin_x64_[filename]），第二个起 already_exists，已移除。
          # 透传各平台的 build target 参数
          args: ${{ matrix.args }}
