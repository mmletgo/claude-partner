# CI — 日常质量门禁
#
# 触发：PR / 推送 master（纯文档/设计稿改动除外）。
# 单平台（ubuntu-22.04）跑前端 lint + 构建、Rust fmt + clippy + 单测，严格门禁（任一失败阻断合并）。
# 三平台完整安装包打包仅在 push v* tag 发版时跑，见 release-tauri.yml。

name: CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'uiux/**'
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'uiux/**'

# 同分支新推送取消旧的进行中 run，省 CI 额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Lint · Typecheck · Build · Clippy · Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux build deps (Tauri 编译/clippy 依赖：webkit2gtk-4.1 等)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            xdg-utils

      - name: Install frontend deps
        run: cd web && npm ci

      - name: Frontend lint (ESLint)
        run: cd web && npm run lint

      - name: Frontend build (tsc 类型检查 + vite build)
        run: cd web && npm run build

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked
